# --- Налаштування для МИШКИ (класичний скрол) ---
Section "InputClass"
        Identifier "My Mouse Settings"
        Driver "libinput"
        # Цей рядок каже застосовувати це до вказівників (мишок)
        MatchIsPointer "yes"
        # Але НЕ до тачпадів (важливо, щоб вони не перетиналися)
        MatchIsTouchpad "no"
        
        # false = Класичний скрол (колесо вниз -> сторінка вниз)
        Option "NaturalScrolling" "false"
EndSection

# --- Налаштування для ТАЧПАДА (натуральний скрол) ---
Section "InputClass"
        Identifier "My Touchpad Settings"
        Driver "libinput"
        # Застосовувати тільки до тачпадів
        MatchIsTouchpad "yes"
        
        # true = Натуральний скрол (рух пальцями вгору -> сторінка вниз, як на телефоні)
        Option "NaturalScrolling" "true"
        
        # БОНУС: Вмикає клік тапом (легкий дотик), якщо у вас це не працює
        Option "Tapping" "on"
EndSection
